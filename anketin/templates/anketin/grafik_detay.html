{% extends 'anketin/base.html' %}

{% block title %}Grafik: {{ soru.soru_metni }} - Anketin{% endblock %}

{% block content %}
<div class="poll-detail-wrapper" style="max-width: 800px;">
    <a href="{% url 'anketin:grafikler' %}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Grafiklere Dön
    </a>

    <div class="poll-detail-card" style="display: flex; flex-direction: column; align-items: center;">
        <h1 style="margin-bottom: 3rem; text-align: center; color: #38bdf8;">{{ soru.soru_metni }}</h1>
        
        <div style="width: 100%; max-width: 450px; position: relative;">
            <canvas id="pollChart"></canvas>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 3rem;">
            <a href="{% url 'anketin:detail' soru.id %}" class="outline-btn" style="text-decoration: none; font-size: 1rem; padding: 0.8rem 1.5rem;">
                Ankete Oy Ver
            </a>
            <a href="{% url 'anketin:results' soru.id %}" class="submit-vote-btn" style="text-decoration: none; font-size: 1rem; padding: 0.8rem 1.5rem;">
                Detaylı Sonuçlar
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Register the datalabels plugin
        Chart.register(ChartDataLabels);

        const ctx = document.getElementById('pollChart').getContext('2d');
        
        // Backend'dan (views.json_dumps) gelen serialize edilmiş veriler
        const labels = {{ chart_labels_json|safe }};
        const data = {{ chart_data_json|safe }};

        // Temaya uygun, Yüksek Kontrastlı Renk Paleti (Mor Renk Yasak!)
        const backgroundColors = [
            '#06B6D4', // Cyber Cyan
            '#F43F5E', // Neon Rose
            '#EAB308', // Golden Amber
            '#10B981', // Emerald Green
            '#F97316', // Vivid Orange
            '#3B82F6', // Solid Blue
            '#84CC16', // Neon Yellow-Green
            '#EC4899', // Bright Pink
            '#0EA5E9', // Sky Blue
            '#F59E0B'  // Deep Amber
        ];

        new Chart(ctx, {
            type: 'pie', 
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: backgroundColors,
                    borderWidth: 3,
                    borderColor: '#020617', // Cyber Blue Theme Background
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    datalabels: {
                        color: '#F8FAFC',
                        font: {
                            family: "'Outfit', sans-serif",
                            weight: 'bold',
                            size: 16
                        },
                        textShadowBlur: 8,
                        textShadowColor: 'rgba(0,0,0,0.8)',
                        formatter: (value, ctx) => {
                            let sum = 0;
                            let dataArr = ctx.chart.data.datasets[0].data;
                            dataArr.map(val => {
                                sum += val;
                            });
                            if (sum === 0 || value === 0) return ''; // Hide 0%
                            let percentage = Math.round((value * 100 / sum)) + "%";
                            return percentage;
                        }
                    },
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#F8FAFC', // CSS değişkeni canvas'ta siyah çıkar, doğrudan beyaz HEX verildi
                            padding: 20,
                            font: {
                                family: "'Outfit', sans-serif",
                                size: 14
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(2, 6, 23, 0.95)',
                        titleColor: '#06B6D4',
                        titleFont: { family: "'Outfit', sans-serif", size: 14 },
                        bodyFont: { family: "'Outfit', sans-serif", size: 15 },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                if (label) {
                                    label += ': ';
                                }
                                if (context.parsed !== null) {
                                    label += context.parsed + ' Oy';
                                }
                                return label;
                            }
                        }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
