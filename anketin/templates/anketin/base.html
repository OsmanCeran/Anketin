{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Anketin - Anketler{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'anketin/style.css' %}?v={{ request.ctime|default:'14' }}">
    <!-- Chart.js Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Fallback cache-breaker for strict browsers */
        svg { max-width: 80px; }
        body { background-color: #00303F; }
    </style>
</head>
<body>
    <!-- ÜST MENÜ / NAVBAR -->
    <nav class="top-navbar">
        <div class="nav-container">
            <a href="{% url 'anketin:index' %}" class="nav-logo">
                <div class="logo-icon-wrapper">
                    <!-- Modern Bar Chart Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                        <line x1="2" y1="20" x2="22" y2="20"></line>
                    </svg>
                </div>
                <span class="logo-text">ANKETİN</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'anketin:index' %}">Anasayfa</a>
                <a href="{% url 'anketin:anketler' %}">Anketler</a>
                <a href="{% url 'anketin:grafikler' %}">Grafikler</a>
                <a href="{% url 'anketin:anket_ekle' %}" style="color: #A9BF3C; font-weight: 600;">+ Anket Ekle</a>
            </div>
        </div>
    </nav>

    <!-- ANA İÇERİK -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
